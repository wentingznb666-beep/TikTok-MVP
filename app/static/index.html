<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok 电商卖家助手</title>
  <style>
    /* ═══════════ 深色主题 ═══════════ */
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-hover: #222240;
      --border: #2a2a4a;
      --text: #e0e0f0;
      --text-secondary: #8888aa;
      --primary: #6c5ce7;
      --primary-hover: #7d6ff0;
      --accent: #00d2a0;
      --danger: #ff6b6b;
      --warning: #ffa502;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(ellipse at top, #1a1a3e 0%, var(--bg) 70%);
    }

    /* ═══════════ 顶部导航 ═══════════ */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo { font-size: 24px; }
    .topbar-title {
      font-size: 16px;
      font-weight: 700;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-user {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .btn-sm {
      padding: 6px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-sm:hover { border-color: var(--primary); }
    .btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ═══════════ Tab 切换 ═══════════ */
    .main-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      background: var(--card);
      padding: 0 24px;
    }

    .main-tab {
      padding: 14px 24px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: var(--transition);
    }

    .main-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .main-tab:hover:not(.active) {
      color: var(--text);
    }

    /* ═══════════ 主内容区 ═══════════ */
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* 桌面端左右分栏 */
    .layout {
      display: flex;
      gap: 24px;
    }

    .layout-sidebar {
      width: 320px;
      flex-shrink: 0;
    }

    .layout-main {
      flex: 1;
      min-width: 0;
    }

    /* ═══════════ 通用卡片 ═══════════ */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ═══════════ 输入方式选择 ═══════════ */
    .input-methods {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .method-btn {
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
    }

    .method-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ═══════════ 文本输入 ═══════════ */
    .textarea-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: var(--transition);
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
    }

    textarea::placeholder { color: #555; }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: -12px;
      margin-bottom: 12px;
    }

    /* ═══════════ 文件上传区 ═══════════ */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 16px;
      display: none;
    }

    .upload-zone:hover {
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.05);
    }

    .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
    .upload-zone .hint { font-size: 12px; margin-top: 4px; }

    .uploaded-file {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(0, 210, 160, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .uploaded-file .remove-file {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 16px;
    }

    /* ═══════════ 按钮 ═══════════ */
    .btn-primary-lg {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary-lg:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-primary-lg:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ═══════════ 加载动画 ═══════════ */
    .loading-spinner {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════ 分析结果 ═══════════ */
    .result-container { display: none; }

    .dim-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .dim-header {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dim-content p {
      margin-bottom: 8px;
      line-height: 1.6;
      font-size: 14px;
    }

    .dim-content ul {
      padding-left: 20px;
      margin-bottom: 8px;
    }

    .dim-content li {
      margin-bottom: 4px;
      line-height: 1.5;
      font-size: 14px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(108, 92, 231, 0.15);
      color: var(--primary);
      border-radius: 20px;
      font-size: 12px;
      margin: 2px 4px 2px 0;
    }

    .tag.good { background: rgba(0, 210, 160, 0.15); color: var(--accent); }
    .tag.warn { background: rgba(255, 107, 107, 0.15); color: var(--danger); }

    /* ═══════════ 历史记录侧栏 ═══════════ */
    .history-list {
      max-height: 500px;
      overflow-y: auto;
    }

    .history-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: var(--transition);
    }

    .history-item:hover {
      border-color: var(--primary);
      background: var(--card-hover);
    }

    .history-item .preview {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item .meta {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-secondary);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 8px; }

    /* ═══════════ 翻译区域 ═══════════ */
    .translate-panel { display: none; }

    .direction-switch {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 16px;
      width: fit-content;
    }

    .direction-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
    }

    .direction-btn.active {
      background: var(--primary);
      color: #fff;
    }

    .translate-output {
      min-height: 100px;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ═══════════ 响应式 ═══════════ */
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }

      .layout-sidebar {
        width: 100%;
        order: 2;
      }

      .layout-main {
        order: 1;
      }

      .topbar {
        padding: 10px 16px;
      }

      .topbar-title {
        font-size: 14px;
      }

      .main-content {
        padding: 16px;
      }

      .card {
        padding: 16px;
      }

      .history-list {
        max-height: 300px;
      }
    }
  </style>
</head>
<body>
  <!-- ═══════════ 顶部导航 ═══════════ -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🛍️</span>
      <span class="topbar-title" data-i18n="appTitle">TikTok 电商卖家助手</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="usernameDisplay"></span>
      <button class="btn-sm" id="langSwitchBtn" onclick="toggleLang()">ภาษาไทย</button>
      <button class="btn-sm danger" data-i18n="logout" onclick="doLogout()">退出登录</button>
    </div>
  </div>

  <!-- ═══════════ 主 Tab ═══════════ -->
  <div class="main-tabs">
    <button class="main-tab active" data-i18n="tabAnalyze" onclick="switchMainTab('analyze')">📊 视频分析</button>
    <button class="main-tab" data-i18n="tabTranslate" onclick="switchMainTab('translate')">🔄 中泰翻译</button>
  </div>

  <!-- ═══════════ 主内容 ═══════════ -->
  <div class="main-content">

    <!-- ══════ Tab1: 视频分析 ══════ -->
    <div id="analyzePanel" class="layout">

      <!-- 左侧：历史记录 -->
      <div class="layout-sidebar">
        <div class="card">
          <div class="card-title" data-i18n="historyTitle">📜 历史记录</div>
          <div class="history-list" id="historyList">
            <div class="empty-state">
              <div class="icon">📭</div>
              <div data-i18n="noHistory">暂无分析记录</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：输入 + 结果 -->
      <div class="layout-main">
        <!-- 输入区域 -->
        <div class="card" id="inputCard">
          <div class="card-title" data-i18n="inputLabel">输入方式</div>

          <!-- 输入方式选择 -->
          <div class="input-methods">
            <button class="method-btn active" data-method="text" onclick="switchInputMethod('text')" data-i18n="pasteText">📝 粘贴文案</button>
            <button class="method-btn" data-method="video" onclick="switchInputMethod('video')" data-i18n="uploadVideo">🎬 上传视频</button>
            <button class="method-btn" data-method="image" onclick="switchInputMethod('image')" data-i18n="uploadImage">🖼️ 上传商品图 <span data-i18n="uploadImageOptional">(可选)</span></button>
          </div>

          <!-- 文本输入 -->
          <div id="textInputArea">
            <div class="textarea-wrap">
              <textarea id="copyText" data-i18n="textPlaceholder" placeholder="在此粘贴带货视频的口播文案..."></textarea>
            </div>
            <div class="char-count"><span id="charCount">0</span> 字</div>
          </div>

          <!-- 视频上传 -->
          <div id="videoUploadArea" style="display:none;">
            <div class="upload-zone" id="videoDropZone" style="display:block;" onclick="document.getElementById('videoInput').click()">
              <div class="icon">🎬</div>
              <div data-i18n="dragDrop">点击上传视频文件</div>
              <div class="hint" data-i18n="videoHint">支持 mp4/mov，最大 100MB</div>
            </div>
            <input type="file" id="videoInput" accept=".mp4,.mov" style="display:none" onchange="onFileSelected('video')">
            <div class="uploaded-file" id="videoFileInfo">
              <span>🎬</span>
              <span id="videoFileName"></span>
              <button class="remove-file" onclick="clearFile('video')">✕</button>
            </div>
          </div>

          <!-- 图片上传 -->
          <div id="imageUploadArea" style="display:none;">
            <div class="upload-zone" id="imageDropZone" style="display:block;" onclick="document.getElementById('imageInput').click()">
              <div class="icon">🖼️</div>
              <div data-i18n="dragDrop">点击上传商品图片</div>
              <div class="hint" data-i18n="imageHint">支持 jpg/png/webp</div>
            </div>
            <input type="file" id="imageInput" accept=".jpg,.jpeg,.png,.webp" style="display:none" onchange="onFileSelected('image')">
            <div class="uploaded-file" id="imageFileInfo">
              <span>🖼️</span>
              <span id="imageFileName"></span>
              <button class="remove-file" onclick="clearFile('image')">✕</button>
            </div>
          </div>

          <!-- 分析按钮 -->
          <button class="btn-primary-lg" data-i18n="analyzeBtn" id="analyzeBtn" onclick="doAnalyze()">🔍 开始分析</button>

          <!-- 加载动画 -->
          <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <div data-i18n="analyzing">分析中，请稍候...</div>
          </div>
        </div>

        <!-- 分析结果 -->
        <div class="result-container" id="resultContainer"></div>
      </div>
    </div>

    <!-- ══════ Tab2: 中泰翻译 ══════ -->
    <div id="translatePanel" class="translate-panel">
      <div class="card">
        <div class="card-title" data-i18n="translateDirection">翻译方向</div>
        <div class="direction-switch">
          <button class="direction-btn active" data-dir="zh2th" onclick="switchTranslateDir('zh2th')" data-i18n="zh2th">中 → 泰</button>
          <button class="direction-btn" data-dir="th2zh" onclick="switchTranslateDir('th2zh')" data-i18n="th2zh">泰 → 中</button>
        </div>

        <textarea id="translateInput" data-i18n="translateInput" placeholder="输入要翻译的文本..." style="min-height:120px;"></textarea>

        <button class="btn-primary-lg" data-i18n="translateBtn" id="translateBtn" onclick="doTranslate()" style="margin-top:12px;">🔄 翻译</button>

        <div class="loading-spinner" id="translateSpinner">
          <div class="spinner"></div>
          <div data-i18n="translating">翻译中...</div>
        </div>

        <div data-i18n="translateResult" style="font-weight:700; margin-top:20px; margin-bottom:8px; display:none;" id="translateResultLabel">翻译结果</div>
        <div class="translate-output" id="translateOutput" style="display:none;"></div>
        <button class="btn-primary-lg" data-i18n="copyResult" id="copyResultBtn" onclick="copyTranslateResult()" style="display:none; margin-top:12px;">复制译文</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ 脚本 ═══════════ -->
  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
